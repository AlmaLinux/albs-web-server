# Docker's embedded DNS. Resolving upstreams at request time (via variables in
# proxy_pass below) lets nginx pick up new container IPs after recreate without
# requiring an nginx restart.
resolver 127.0.0.11 valid=10s ipv6=off;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen           80;
    client_max_body_size 100M;

    location / {
        set $upstream_frontend "frontend:8080";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_pass http://$upstream_frontend;
    }

    location /api/v1/ {
        set $upstream_backend "web_server:8000";
        proxy_read_timeout 900s;
        proxy_set_header Host $http_host;
        proxy_set_header Connection $http_connection;
        proxy_set_header Upgrade $http_upgrade;
        proxy_pass http://$upstream_backend;
    }

    location /api_3/ {
        set $upstream_backend "web_server:8000";
        proxy_read_timeout 900s;
        proxy_set_header Host $http_host;
        proxy_set_header Connection $http_connection;
        proxy_set_header Upgrade $http_upgrade;
        proxy_pass http://$upstream_backend;
    }

    location /coprs/ {
        set $upstream_backend "web_server:8000";
        proxy_read_timeout 900s;
        proxy_set_header Host $http_host;
        proxy_set_header Connection $http_connection;
        proxy_set_header Upgrade $http_upgrade;
        proxy_pass http://$upstream_backend;
    }

    location /docs {
        set $upstream_backend "web_server:8000";
        proxy_pass http://$upstream_backend;
    }

    location /openapi.json {
        set $upstream_backend "web_server:8000";
        proxy_pass http://$upstream_backend;
    }

    # Prometheus metrics.
    location /metrics {
        set $upstream_backend "web_server:8000";
        proxy_set_header Host $http_host;
        proxy_pass http://$upstream_backend;
    }

    location /pulp/ {
        set $upstream_pulp "pulp:80";
        # header for decompressing build/test logs
        if ($request_uri ~* (\.log$)) {
            add_header Content-Encoding gzip;
        }
        proxy_pass http://$upstream_pulp;
    }

    location /sign-file/ {
        set $upstream_signfile "sign_file:8000";
        proxy_set_header Host $http_host;
        proxy_pass http://$upstream_signfile/;
    }
}
