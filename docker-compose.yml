# ─────────────────────────────────────────────────────────────────────────────
# Pulp runs as a scalable multi-container stack (pulp-minimal + pulp-web), based
# on pulp-oci-images, instead of the old all-in-one pulp/pulp image.
#
# The services that talk to Pulp (web_server + the task_queue_* workers) read
# their Pulp config from vars.env (env_file). For the dev stack, vars.env MUST
# set these to reach the stack below — NOT the test_db defaults:
#   PULP_HOST=http://pulp                  # pulp_web alias, nginx on :80. Do NOT
#                                          # use "pulp_web": Django rejects the
#                                          # underscore in the Host header.
#   PULP_USER=admin
#   PULP_PASSWORD=password
#   PULP_DATABASE_URL=postgresql+psycopg2://postgres:password@postgres:5432/pulp
#   PULP_ASYNC_DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/pulp
#   FASTAPI_SQLA__PULP__SQLALCHEMY_URL=postgresql+psycopg2://postgres:password@postgres:5432/pulp
#   FASTAPI_SQLA__PULP_ASYNC__SQLALCHEMY_URL=postgresql+asyncpg://postgres:password@postgres:5432/pulp
# (tests/test-vars.env keeps these pointed at test_db for the test suite.)
# ─────────────────────────────────────────────────────────────────────────────
services:

  test_db:
    image: postgres:13
    profiles: ["tests"]
    env_file:
      - vars.env

  web_server_tests:
    image: albs-web-server-tests:latest
    profiles: ["tests"]
    env_file:
      - vars.env
    build:
      context: .
      dockerfile: Dockerfile
      target: web-server-tests
    volumes:
      - ".:/code:z"

  db:
    image: postgres:13
    env_file:
      - vars.env
    environment:
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256 --encoding=UTF8 --locale=en_US.UTF-8 --data-checksums
      - POSTGRES_HOST_AUTH_METHOD=scram-sha-256
    ports:
      - "5432:5432"
    volumes:
      - "../volumes/postgresql/data:/var/lib/postgresql/data:z"
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  rabbitmq:
    image: rabbitmq:3.8-management
    container_name: "rabbitmq-ts"
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file:
      - vars.env
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  alts-celery:
    image: alts-celery:latest
    build:
      dockerfile: Dockerfile.celery
      context: ../alts
    environment:
      CELERY_CONFIG_PATH: "/celery_config.yaml"
      EXTERNAL_NETWORK: "${COMPOSE_PROJECT_NAME:-albs-web-server}_default"
    command:
      celery -A alts.worker.app worker
        --pool=threads --concurrency=20
        --loglevel=INFO -Q docker-x86_64-0 -O fair --without-gossip
        --without-mingle --without-heartbeat
    restart: on-failure
    privileged: true
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "../alts/configs/alts_config.yaml:/celery_config.yaml:z"
      - "../alts/alts:/code/alts:z"
      - "../alts/resources:/code/resources:z"
    depends_on:
      - rabbitmq
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  alts-scheduler:
    image: alts-scheduler:latest
    build:
      context: ../alts
      dockerfile: Dockerfile.scheduler
      target: alts-scheduler
    ports:
      - "8082:8000"
    environment:
      CELERY_CONFIG_PATH: "/scheduler_config.yaml"
      SCHEDULER_CONFIG_PATH: "/scheduler_config.yaml"
    command: |
      bash -c "
        set -ex
        /wait-for-it.sh web_server:8000
        uvicorn --host 0.0.0.0 alts.scheduler.app:app --limit-concurrency 100 --backlog 1000"
    restart: on-failure
    volumes:
      - "../alts/configs/alts_config.yaml:/scheduler_config.yaml:z"
      - "../alts/alts:/code/alts:z"
      - "../alts/resources:/code/resources:z"
    depends_on:
      - web_server
      - rabbitmq
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  web_server:
    image: albs-web-server:latest
    env_file:
      - vars.env
    ports:
      - "8088:8000"
    build:
      context: .
      dockerfile: Dockerfile
      target: web-server
    volumes:
      - "./alws:/code/alws:z"
      - "./scripts:/code/scripts:z"
      - "./reference_data:/code/reference_data:z"
      - "../volumes/pulp/exports:/srv/exports:z"
    command: |
      bash -c "
        set -ex
        /wait-for-it.sh db:5432
        PYTHONPATH=. alembic --config alws/alembic.ini upgrade head
        uvicorn --host 0.0.0.0 alws.app:app"
    restart: on-failure
    depends_on:
      - db
      - pulp_api
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  task_queue:
    image: task-queue:latest
    env_file:
      - vars.env
    build:
      dockerfile: Dockerfile.task-queue
      context: .
    volumes:
      - "./alws:/code/alws:z"
    command: |
      bash -c "
        set -ex
        /wait-for-it.sh rabbitmq:5672
        dramatiq alws.dramatiq --threads 1 -Q default"
    restart: on-failure
    depends_on:
      - db
      - pulp_api
      - rabbitmq
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  task_queue_sources:
    image: task-queue:latest
    env_file:
      - vars.env
    build:
      dockerfile: Dockerfile.task-queue
      context: .
    volumes:
      - "./alws:/code/alws:z"
    command: |
      bash -c "
        set -ex
        /wait-for-it.sh rabbitmq:5672
        dramatiq alws.dramatiq --threads 1 -Q sources"
    restart: on-failure
    depends_on:
      - db
      - pulp_api
      - rabbitmq
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  task_queue_builds:
    image: task-queue:latest
    env_file:
      - vars.env
    build:
      dockerfile: Dockerfile.task-queue
      context: .
    volumes:
      - "./alws:/code/alws:z"
    command: |
      bash -c "
        set -ex
        /wait-for-it.sh rabbitmq:5672
        dramatiq alws.dramatiq --threads 1 -Q builds"
    restart: on-failure
    depends_on:
      - db
      - pulp_api
      - rabbitmq
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  task_queue_errata:
    image: task-queue:latest
    env_file:
      - vars.env
    build:
      dockerfile: Dockerfile.task-queue
      context: .
    volumes:
      - "./alws:/code/alws:z"
    command: |
      bash -c "
        set -ex
        /wait-for-it.sh rabbitmq:5672
        dramatiq alws.dramatiq --processes 1 --threads 1 -Q errata"
    restart: on-failure
    depends_on:
      - db
      - pulp_api
      - rabbitmq
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  task_queue_releases:
    image: task-queue:latest
    env_file:
      - vars.env
    build:
      dockerfile: Dockerfile.task-queue
      context: .
    volumes:
      - "./alws:/code/alws:z"
    command: |
      bash -c "
        set -ex
        /wait-for-it.sh rabbitmq:5672
        dramatiq alws.dramatiq --processes 1 --threads 1 -Q releases"
    restart: on-failure
    depends_on:
      - db
      - pulp_api
      - rabbitmq
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  task_queue_sign:
    image: task-queue:latest
    env_file:
      - vars.env
    build:
      dockerfile: Dockerfile.task-queue
      context: .
    volumes:
      - "./alws:/code/alws:z"
    command: dramatiq alws.dramatiq --processes 1 --threads 1 -Q sign
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  task_queue_product_modify:
    image: task-queue:latest
    env_file:
      - vars.env
    build:
      dockerfile: Dockerfile.task-queue
      context: .
    volumes:
      - "./alws:/code/alws:z"
    command: dramatiq alws.dramatiq --processes 3 --threads 1 -Q product_modify
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  task_queue_tests:
    image: task-queue:latest
    env_file:
      - vars.env
    build:
      dockerfile: Dockerfile.task-queue
      context: .
    volumes:
      - "./alws:/code/alws:z"
    command: |
      bash -c "
        set -ex
        /wait-for-it.sh rabbitmq:5672
        dramatiq alws.dramatiq --processes 1 --threads 1 -Q tests"
    restart: on-failure
    depends_on:
      - db
      - pulp_api
      - rabbitmq
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  frontend:
    image: albs-frontend:latest
    env_file:
      - vars.env
    build:
      dockerfile: Dockerfile
      context: ../albs-frontend
    command: npm run dev
    volumes:
      - "../albs-frontend:/home/albs/code:z"
    restart: on-failure
    depends_on:
      - web_server
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  build_node:
    image: albs-node:latest
    privileged: true
    build:
      context: ../albs-node
      dockerfile: Dockerfile
      target: albs-node
    env_file:
      - vars.env
    volumes:
      - "../albs-node/node-config/castor/build_node.yml:/root/.config/castor/build_node.yml:z"
      - "../albs-node/build_node:/build-node/build_node:z"
      - "../albs-node/almalinux_build_node.py:/build-node/almalinux_build_node.py:z"
    restart: on-failure
    command: |
      bash -c "
        set -ex
        /wait-for-it.sh web_server:8000
        python3 almalinux_build_node.py -v -t 2"
    depends_on:
      - web_server
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  sign_node:
    image: sign-node:latest
    build:
      context: ../albs-sign-node
      dockerfile: Dockerfile
      target: sign-node
    env_file:
      - vars.env
    volumes:
      - "~/.gnupg:/root/.gnupg:z"
      - "../albs-sign-node/node-config/sign_node.yml:/root/.config/sign_node.yml:z"
      - "../albs-sign-node/almalinux_sign_node.py:/sign-node/almalinux_sign_node.py:z"
      - "../albs-sign-node/sign_node:/sign-node/sign_node:z"
    restart: on-failure
    command: |
      bash -c "
        set -ex
        /wait-for-it.sh web_server:8000
        python3 almalinux_sign_node.py -v"
    depends_on:
      - web_server
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  gitea_listener:
    image: gitea-listener:latest
    build:
      dockerfile: Dockerfile.gitea-listener
      context: .
    env_file:
      - vars.env
    restart: on-failure
    depends_on:
      - mosquitto
    volumes:
      - "./alws/scripts/albs-gitea-listener/gitea_listener.py:/code/gitea_listener.py:z"
      - "./alws/scripts/albs-gitea-listener/gitea_models.py:/code/gitea_models.py:z"
      - "./alws/scripts/albs-gitea-listener/albs-gitea-listener-config.yaml:/code/albs-gitea-listener-config.yaml:z"
      - "./alws/scripts/git_cacher/git_cacher.py:/code/git_cacher.py:z"
      - "./alws:/code/alws:z"
    command: python3 gitea_listener.py
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  git_cacher:
    image: git-cacher:latest
    build:
      dockerfile: Dockerfile.git-cacher
      context: .
    env_file:
      - vars.env
    restart: on-failure
    depends_on:
      - redis
    volumes:
      - "./alws:/code/alws:z"
      - "./alws/scripts/git_cacher/git_cacher.py:/code/git_cacher.py:z"
    command: python3 git_cacher.py
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  tests_cacher:
    image: alma-tests-cacher:latest
    build:
      context: ../alma-tests-cacher
      dockerfile: Dockerfile
      target: cacher
    restart: on-failure
    volumes:
      - "../alma-tests-cacher/alma_tests_cacher:/code/alma_tests_cacher:z"
      - "../alma-tests-cacher/alma_tests_cacher.py:/code/alma_tests_cacher.py:z"
      - "../alma-tests-cacher/vars.yaml:/code/vars.yaml:z"
    command: |
      bash -c "
        set -ex
        /wait-for-it.sh web_server:8000
        python3 alma_tests_cacher.py"
    depends_on:
      - web_server
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  # ───────────────────────────────────────────────────────────────────────────
  # Pulp — scalable multi-container stack (pulp-minimal + pulp-web), replacing
  # the old all-in-one pulp/pulp image. Config assets live under ./assets/pulp/.
  # The ALBS services reach this via vars.env (host "pulp", DB "postgres") — see
  # the PULP_* notes at the top of this file. DEV ONLY: postgres/password,
  # admin/password.
  # ───────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    ports:
      - "5431:5432"   # host:container — keeps the old all-in-one's external port
    env_file:
      - pulp-postgres.env
    volumes:
      - "../volumes/pulp/pgsql_16:/var/lib/postgresql/data:z"
    restart: always
    healthcheck:
      test: pg_isready -U postgres
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  pulp_redis:
    image: redis
    volumes:
      - "pulp_redis:/data"
    restart: always
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  pulp_migration:
    image: pulp/pulp-minimal:3.49.1
    # pulp-minimal (unlike the old all-in-one image) does NOT auto-generate the
    # DB field-encryption key. Generate it here on first run if missing, then
    # migrate. The key persists in the ./assets/pulp/certs bind mount — back it
    # up; losing it makes encrypted DB fields unrecoverable.
    command: |
      bash -c "
        set -e
        if [ ! -s /etc/pulp/certs/database_fields.symmetric.key ]; then
          echo 'Generating Pulp DB encryption key...'
          python3 -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())' > /etc/pulp/certs/database_fields.symmetric.key
          chmod 0644 /etc/pulp/certs/database_fields.symmetric.key
        fi
        pulpcore-manager migrate --noinput"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - "./assets/pulp/settings.py:/etc/pulp/settings.py:z"
      - "./assets/pulp/certs:/etc/pulp/certs:z"
      - "pulp_storage:/var/lib/pulp"
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  pulp_set_init_password:
    image: pulp/pulp-minimal:3.49.1
    command: set_init_password.sh
    depends_on:
      postgres:
        condition: service_healthy
      pulp_migration:
        condition: service_completed_successfully
    environment:
      PULP_DEFAULT_ADMIN_PASSWORD: password
    volumes:
      - "./assets/pulp/settings.py:/etc/pulp/settings.py:z"
      - "./assets/pulp/certs:/etc/pulp/certs:z"
      - "pulp_storage:/var/lib/pulp"
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  pulp_api:
    image: pulp/pulp-minimal:3.49.1
    command: ['pulp-api']
    hostname: pulp-api
    user: pulp
    depends_on:
      postgres:
        condition: service_healthy
      pulp_redis:
        condition: service_healthy
      pulp_migration:
        condition: service_completed_successfully
      pulp_set_init_password:
        condition: service_completed_successfully
    volumes:
      - "./assets/pulp/settings.py:/etc/pulp/settings.py:z"
      - "./assets/pulp/certs:/etc/pulp/certs:z"
      - "pulp_storage:/var/lib/pulp"
      - "../volumes/pulp/exports:/srv/exports:z"
    restart: always
    healthcheck:
      test: readyz.py /pulp/api/v3/status/
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  pulp_content:
    image: pulp/pulp-minimal:3.49.1
    command: ['pulp-content']
    hostname: pulp-content
    user: pulp
    depends_on:
      postgres:
        condition: service_healthy
      pulp_redis:
        condition: service_healthy
      pulp_migration:
        condition: service_completed_successfully
    volumes:
      - "./assets/pulp/settings.py:/etc/pulp/settings.py:z"
      - "./assets/pulp/certs:/etc/pulp/certs:z"
      - "pulp_storage:/var/lib/pulp"
    restart: always
    healthcheck:
      test: readyz.py /pulp/content/
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  pulp_worker:
    image: pulp/pulp-minimal:3.49.1
    command: ['pulp-worker']
    user: pulp
    depends_on:
      postgres:
        condition: service_healthy
      pulp_redis:
        condition: service_healthy
      pulp_migration:
        condition: service_completed_successfully
    volumes:
      - "./assets/pulp/settings.py:/etc/pulp/settings.py:z"
      - "./assets/pulp/certs:/etc/pulp/certs:z"
      - "pulp_storage:/var/lib/pulp"
      - "../volumes/pulp/exports:/srv/exports:z"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  # nginx front end. Aliased to "pulp" so ALBS can reach it at http://pulp (the
  # old all-in-one service name); listens on :80 internally.
  pulp_web:
    image: pulp/pulp-web:3.49.1
    command: ['/usr/bin/nginx.sh']
    hostname: pulp
    user: root
    ports:
      - "8081:80"   # host:container — browse Pulp at http://localhost:8081/
    depends_on:
      pulp_api:
        condition: service_healthy
      pulp_content:
        condition: service_healthy
    networks:
      default:
        aliases:
          - pulp
    volumes:
      - "./assets/pulp/bin/nginx.sh:/usr/bin/nginx.sh:Z"
      - "./assets/pulp/nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:Z"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  mosquitto:
    image: eclipse-mosquitto:2.0
    ports:
      - "11883:1883"
    volumes:
      - "./mosquitto-no-auth.conf:/mosquitto/config/mosquitto.conf:z"
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  redis:
    image: redis
    ports:
      - 6379:6379
    volumes:
      - "redis:/data"
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  nginx:
    image: nginx
    ports:
      - 8080:80
    volumes:
      - "./nginx_configs:/etc/nginx/conf.d:z"
    depends_on:
      - web_server
      - frontend
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  immudb:
    image: codenotary/immudb:1.5
    ports:
      - 3322:3322
      - 9497:9497
    volumes:
      - "../volumes/immudb/data:/var/lib/immudb:Z"
      - "../volumes/immudb/config:/etc/immudb:Z"
      - "../volumes/immudb/logs:/var/log/immudb:Z"
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

  sign_file:
    image: sign-file:latest
    build:
      context: ../albs-sign-file
      dockerfile: Dockerfile
      target: sign-file
    env_file: ../albs-sign-file/.env
    command: |
      bash -c "
        set -ex
        python3 db_manage.py dev_init
        python3 start.py"
    restart: on-failure
    volumes:
      - "${SF_HOST_GNUPG:-~/.gnupg}:/root/.gnupg:z"
      - "../albs-sign-file/sign:/app/sign:z"
      - "../albs-sign-file/start.py:/app/start.py:z"
      - "../albs-sign-file/db_manage.py:/app/db_manage.py:z"
      - "../albs-sign-file/alembic.ini:/app/alembic.ini:z"
      - "../albs-sign-file/alembic:/app/alembic:z"
    ports:
      - "8083:8000"
    logging:
      driver: "json-file"
      options:
        max-size: "100Mb"
        max-file: "3"

volumes:
  redis:
  pulp_redis:
  # Pulp content store. Named volume (not a host bind mount) so Docker populates
  # it from the image — preserving /var/lib/pulp/tmp and the uid:700 (pulp)
  # ownership the pulp-minimal services need.
  pulp_storage:
